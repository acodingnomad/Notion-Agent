name: Check Brand Deals

on:
  schedule:
    # GitHub Actions cron is UTC-only. Times below target PST (UTC-8); during
    # PDT (summer, UTC-7) they land one hour later.
    # 8 runs/day, every 90 min from 9:00 AM to 7:00 PM PST:
    #   on the hour   -> 9:00, 12:00, 3:00, 6:00, 7:00 PM PST (UTC 17,20,23,02,03)
    #   on the half   -> 10:30, 1:30, 4:30 PM PST            (UTC 18:30,21:30,00:30)
    - cron: '0 17,20,23,2,3 * * *'
    - cron: '30 18,21,0 * * *'
  workflow_dispatch:

jobs:
  check-deals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node src/index.js
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GMAIL_REDIRECT_URI: ${{ secrets.GMAIL_REDIRECT_URI }}
          GMAIL_LABEL: ${{ secrets.GMAIL_LABEL }}
