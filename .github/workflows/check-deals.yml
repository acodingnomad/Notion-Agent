name: Check Brand Deals

on:
  schedule:
    # GitHub Actions cron is UTC-only. Times below target PST (UTC-8); during
    # PDT (summer, UTC-7) they land one hour later (10 AM / 3 PM).
    # 17:00 UTC = 9:00 AM PST (morning run)
    # 22:00 UTC = 2:00 PM PST (afternoon run)
    - cron: '0 17,22 * * *'
  workflow_dispatch:

jobs:
  check-deals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node src/index.js
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GMAIL_REDIRECT_URI: ${{ secrets.GMAIL_REDIRECT_URI }}
          GMAIL_LABEL: ${{ secrets.GMAIL_LABEL }}
